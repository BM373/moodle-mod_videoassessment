name: Moodle Plugin CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.moodle-branch }} / ${{ matrix.database }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: 'postgres'
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=8

      mariadb:
        image: mariadb:11.4
        env:
          MYSQL_USER: 'root'
          MYSQL_ALLOW_EMPTY_PASSWORD: "true"
          MYSQL_CHARACTER_SET_SERVER: "utf8mb4"
          MYSQL_COLLATION_SERVER: "utf8mb4_unicode_ci"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=8

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3']
        database: ['pgsql', 'mariadb']
        moodle-branch:
          - 'MOODLE_405_STABLE'
          - 'MOODLE_500_STABLE'
          - 'MOODLE_501_STABLE'
          - 'MOODLE_502_STABLE'

    env:
      DB: ${{ matrix.database }}
      MOODLE_BRANCH: ${{ matrix.moodle-branch }}

    steps:
      - name: Check out plugin code
        uses: actions/checkout@v5
        with:
          path: plugin

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pgsql, mysqli, gd, zip, intl, soap, xmlrpc, sodium
          ini-values: max_input_vars=5000
          coverage: pcov

      - name: Set up Node.js LTS
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Install ffmpeg (required by mod_videoassessment)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist \
            moodlehq/moodle-plugin-ci ci '^4 || ^5'
          echo "$(cd ci/bin; pwd)" >> "$GITHUB_PATH"
          echo "$(cd ci/vendor/bin; pwd)" >> "$GITHUB_PATH"
          sudo locale-gen en_AU.UTF-8 || true
          if [ -f ci/.github/.problemmatcher/php.json ]; then
            echo "::add-matcher::ci/.github/.problemmatcher/php.json"
          fi

      - name: Install Moodle and dependencies
        run: moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1

      - name: PHP Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phplint

      # The phpcpd step has been removed: sebastian/phpcpd is officially
      # abandoned ("Package sebastian/phpcpd is abandoned, you should
      # avoid using it") and moodle-plugin-ci prints "The phpcpd command
      # is deprecated and will be removed in 5.0.0. No replacement is
      # planned." Keeping it produced two annotations per matrix job for
      # zero ongoing benefit. The major duplicate blocks were already
      # extracted into videoassessment_handle_post_save_rubric_redirect()
      # (lib.php) and grade_table::resolve_sorted_users() before the step
      # was retired.

      - name: PHP Mess Detector
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci codechecker --max-warnings 0

      - name: Moodle PHPDoc Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpdoc --max-warnings 0

      - name: Validate
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci validate

      - name: Upgrade savepoints check
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci mustache

      - name: Grunt
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci grunt --max-lint-warnings 0

      - name: PHPUnit (with coverage)
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpunit --coverage-text --fail-on-warning

      - name: Behat
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci behat --profile chrome

      - name: Upload Behat artefacts on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v6
        with:
          name: behat-failures-${{ matrix.moodle-branch }}-${{ matrix.database }}-${{ matrix.php }}
          path: |
            moodle/behatdata/**/screenshots
            moodle/behatdata/**/run_*.log
          if-no-files-found: ignore
          retention-days: 7

  coverage-gate:
    name: Coverage 100% gate
    needs: test
    runs-on: ubuntu-22.04
    if: ${{ !cancelled() }}
    steps:
      - name: Coverage gate placeholder
        run: |
          echo "Coverage gate placeholder."
          echo "100% line coverage will be enforced via phpunit.xml.dist <coverage>"
          echo "and a follow-up CLI check, once test files start landing."
